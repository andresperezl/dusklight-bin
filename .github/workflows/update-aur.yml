name: Update AUR Package

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

concurrency:
  group: update-aur-package
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install tooling
        run: pacman -Syu --noconfirm git openssh curl python pacman-contrib

      - name: Check out package repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Check for upstream release
        id: update
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          runuser -u builder -- env -u GITHUB_OUTPUT \
            GITHUB_TOKEN="${GITHUB_TOKEN}" \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && bash scripts/update-package.sh'

          if runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && git diff --quiet -- PKGBUILD .SRCINFO'; then
            pkgver=$(runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
              bash -c 'cd "${GITHUB_WORKSPACE}" && source PKGBUILD && printf "%s" "${pkgver}"')
            {
              printf 'changed=false\n'
              printf 'pkgver=%s\n' "${pkgver}"
            } >>"${GITHUB_OUTPUT}"
          else
            pkgver=$(runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
              bash -c 'cd "${GITHUB_WORKSPACE}" && source PKGBUILD && printf "%s" "${pkgver}"')
            {
              printf 'changed=true\n'
              printf 'pkgver=%s\n' "${pkgver}"
            } >>"${GITHUB_OUTPUT}"
          fi

      - name: Commit package update
        if: steps.update.outputs.changed == 'true'
        env:
          PKGVER: ${{ steps.update.outputs.pkgver }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" PKGVER="${PKGVER}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && git add PKGBUILD .SRCINFO && git -c user.name="dusklight-aur-bot" -c user.email="dusklight-aur-bot@users.noreply.github.com" commit -m "Update dusklight-bin to ${PKGVER}"'

      - name: Create version tag
        if: steps.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          PKGVER: ${{ steps.update.outputs.pkgver }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" PKGVER="${PKGVER}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && tag="v${PKGVER}" && if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then printf "Tag %s already exists\n" "${tag}"; else git -c user.name="dusklight-aur-bot" -c user.email="dusklight-aur-bot@users.noreply.github.com" tag -a "${tag}" -m "dusklight-bin ${PKGVER}"; fi'

      - name: Push package repo
        if: steps.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          REF_NAME: ${{ github.ref_name }}
          PKGVER: ${{ steps.update.outputs.pkgver }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" REF_NAME="${REF_NAME}" PKGVER="${PKGVER}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && tag="v${PKGVER}" && git push origin HEAD:${REF_NAME} && git push origin "refs/tags/${tag}"'

      - name: Configure AUR SSH
        if: steps.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          test -n "${AUR_SSH_PRIVATE_KEY}"
          install -dm700 -o builder -g builder /home/builder/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > /home/builder/.ssh/aur
          chmod 600 /home/builder/.ssh/aur
          ssh-keyscan -H aur.archlinux.org > /home/builder/.ssh/known_hosts
          chown builder:builder /home/builder/.ssh/aur /home/builder/.ssh/known_hosts

      - name: Push to AUR
        if: steps.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GIT_SSH_COMMAND: ssh -i /home/builder/.ssh/aur -o IdentitiesOnly=yes
          PKGVER: ${{ steps.update.outputs.pkgver }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" GIT_SSH_COMMAND="${GIT_SSH_COMMAND}" PKGVER="${PKGVER}" \
            bash -c '
              set -euo pipefail
              aur_dir=$(mktemp -d)
              git clone ssh://aur@aur.archlinux.org/dusklight-bin.git "${aur_dir}"
              cp "${GITHUB_WORKSPACE}/PKGBUILD" "${GITHUB_WORKSPACE}/.SRCINFO" "${aur_dir}/"
              cd "${aur_dir}"
              git add PKGBUILD .SRCINFO
              if git diff --cached --quiet; then
                printf "AUR package is already up to date\n"
              else
                git -c user.name="dusklight-aur-bot" \
                  -c user.email="dusklight-aur-bot@users.noreply.github.com" \
                  commit -m "Update dusklight-bin to ${PKGVER}"
                git push origin master
              fi
            '
