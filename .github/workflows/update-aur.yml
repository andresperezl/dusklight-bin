name: Update AUR Package

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

concurrency:
  group: update-aur-package
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install tooling
        run: pacman -Syu --noconfirm git openssh curl python pacman-contrib

      - name: Check out package repo
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git init "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if [ "${GITHUB_REF_TYPE}" = branch ]; then
            git checkout --force -B "${GITHUB_REF_NAME}" "${GITHUB_SHA}"
          else
            git checkout --force "${GITHUB_SHA}"
          fi

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Check for upstream release
        id: update
        run: |
          runuser -u builder -- env -u GITHUB_OUTPUT \
            GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && bash scripts/update-package.sh'

          if runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && git diff --quiet -- PKGBUILD .SRCINFO'; then
            changed=false
          else
            changed=true
          fi

          pkgver=$(runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && source PKGBUILD && printf "%s" "${pkgver}"')
          pkgrel=$(runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && source PKGBUILD && printf "%s" "${pkgrel}"')
          package_version="${pkgver}-${pkgrel}"

          {
            printf 'changed=%s\n' "${changed}"
            printf 'pkgver=%s\n' "${pkgver}"
            printf 'pkgrel=%s\n' "${pkgrel}"
            printf 'package_version=%s\n' "${package_version}"
          } >>"${GITHUB_OUTPUT}"

      - name: Commit package update
        if: steps.update.outputs.changed == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.update.outputs.package_version }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" PACKAGE_VERSION="${PACKAGE_VERSION}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && git add PKGBUILD .SRCINFO && git -c user.name="dusklight-aur-bot" -c user.email="dusklight-aur-bot@users.noreply.github.com" commit -m "Update dusklight-bin to ${PACKAGE_VERSION}"'

      - name: Create version tag
        if: steps.update.outputs.changed == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.update.outputs.package_version }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" PACKAGE_VERSION="${PACKAGE_VERSION}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && tag="v${PACKAGE_VERSION}" && if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then printf "Tag %s already exists\n" "${tag}"; else git -c user.name="dusklight-aur-bot" -c user.email="dusklight-aur-bot@users.noreply.github.com" tag -a "${tag}" -m "dusklight-bin ${PACKAGE_VERSION}"; fi'

      - name: Push package repo
        if: steps.update.outputs.changed == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.update.outputs.package_version }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" GITHUB_TOKEN="${GITHUB_TOKEN}" REF_NAME="${REF_NAME}" PACKAGE_VERSION="${PACKAGE_VERSION}" \
            bash -c 'cd "${GITHUB_WORKSPACE}" && tag="v${PACKAGE_VERSION}" && origin="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" && git push "${origin}" HEAD:${REF_NAME} && git push "${origin}" "refs/tags/${tag}"'

      - name: Configure AUR SSH
        if: steps.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          test -n "${AUR_SSH_PRIVATE_KEY}"
          install -dm700 -o builder -g builder /home/builder/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > /home/builder/.ssh/aur
          chmod 600 /home/builder/.ssh/aur
          ssh-keyscan -H aur.archlinux.org > /home/builder/.ssh/known_hosts
          chown builder:builder /home/builder/.ssh/aur /home/builder/.ssh/known_hosts

      - name: Push to AUR
        if: steps.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GIT_SSH_COMMAND: ssh -i /home/builder/.ssh/aur -o IdentitiesOnly=yes
          PACKAGE_VERSION: ${{ steps.update.outputs.package_version }}
        run: |
          runuser -u builder -- env GITHUB_WORKSPACE="${GITHUB_WORKSPACE}" GIT_SSH_COMMAND="${GIT_SSH_COMMAND}" PACKAGE_VERSION="${PACKAGE_VERSION}" \
            bash -c '
              set -euo pipefail
              aur_dir=$(mktemp -d)
              git clone ssh://aur@aur.archlinux.org/dusklight-bin.git "${aur_dir}"
              cp "${GITHUB_WORKSPACE}/PKGBUILD" "${GITHUB_WORKSPACE}/.SRCINFO" "${aur_dir}/"
              cd "${aur_dir}"
              git add PKGBUILD .SRCINFO
              if git diff --cached --quiet; then
                printf "AUR package is already up to date\n"
              else
                git -c user.name="dusklight-aur-bot" \
                  -c user.email="dusklight-aur-bot@users.noreply.github.com" \
                  commit -m "Update dusklight-bin to ${PACKAGE_VERSION}"
                git push origin master
              fi
            '
